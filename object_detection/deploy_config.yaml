# Example: DEPLOY an INT8 .tflite to the STM32H747I-DISCO (operation_mode: deployment).
#   python stm32ai_main.py --config-name deploy_config
# This generates C sources via ST Edge AI, drops them into the H7 app, and builds
# the CubeIDE project headlessly. Open the generated project, Build -> Debug, flash.
# To deploy straight from a fresh training run instead, use chain_qd (quantize -> deploy).

general:
  project_name: stop_sign_st_yololcv1_256_k2

operation_mode: deployment

model:
  model_type: st_yololcv1
  # The shipped champion (256_default + k=2 obj-rescale, int8 mAP 42.3 %).
  # Use ../MODELS/192k1.tflite for the faster, lower-mAP compact alternative.
  model_path: ../MODELS/256k2.tflite
  input_shape: (256,256,3)

dataset:
  class_names: [stop_sign]

preprocessing:
  resizing: {aspect_ratio: fit, interpolation: nearest}
  color_mode: rgb

postprocessing:
  confidence_thresh: 0.5        # operating point for the live LCD demo (not the 0.001 used for mAP eval)
  NMS_thresh: 0.5
  IoU_eval_thresh: 0.5
  max_detection_boxes: 10

tools:
  stedgeai:
    optimization: balanced
    on_cloud: False
    path_to_stedgeai: C:/ST/STEdgeAI/4.0/Utilities/windows/stedgeai.exe
  path_to_cubeIDE: C:/ST/STM32CubeIDE_1.17.0/STM32CubeIDE/stm32cubeide.exe

deployment:
  c_project_path: ../application_code/object_detection/STM32H7/
  IDE: GCC
  verbosity: 1
  hardware_setup:
    serie: STM32H7
    board: STM32H747I-DISCO

mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
